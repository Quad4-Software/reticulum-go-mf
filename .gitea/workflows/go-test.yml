name: Go Test

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

env:
  GOFLAGS: -mod=vendor

jobs:
  test:
    name: Test (${{ matrix.os }}, ${{ matrix.goarch }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goarch: amd64
          - os: ubuntu-latest
            goarch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Source
        uses: https://git.quad4.io/actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Go
        uses: https://git.quad4.io/actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version: '1.26.2'

      - name: Setup Task
        uses: https://git.quad4.io/actions/setup-task@0ab1b2a65bc55236a3bc64cde78f80e20e8885c2 # v1
        with:
          version: '3.46.3'

      - name: Cache Go modules
        uses: https://git.quad4.io/actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
            vendor
          key: ${{ runner.os }}-go-${{ matrix.goarch }}-vendor-${{ hashFiles('go.sum', 'vendor/modules.txt') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.goarch }}-vendor-

      - name: Install dependencies
        env:
          GOFLAGS: ''
        run: |
          go install github.com/mgechev/revive@latest
          go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Verify vendored tree matches go.mod
        run: |
          go mod vendor
          git diff --exit-code -- go.mod go.sum vendor/

      - name: Run code quality checks
        run: task check

      - name: Run tests with race detector (AMD64 only)
        if: matrix.goarch == 'amd64'
        run: task test-race
