name: TinyGo Test

on:
  push:
    branches:
      - main
      - master
      - tinygo
  pull_request:
    branches:
      - main
      - master
      - tinygo

permissions:
  contents: read

jobs:
  tinygo-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: https://git.quad4.io/actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Go
        uses: https://git.quad4.io/actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00
        with:
          go-version: '1.24'

      - name: Setup Task
        uses: https://git.quad4.io/actions/setup-task@0ab1b2a65bc55236a3bc64cde78f80e20e8885c2 # v1
        with:
          version: '3.46.3'

      - name: Install TinyGo
        run: |
          wget https://github.com/tinygo-org/tinygo/releases/download/v0.37.0/tinygo_0.37.0_amd64.deb
          sudo dpkg -i tinygo_0.37.0_amd64.deb

      - name: Test TinyGo compilation
        run: task tinygo:test

      - name: Test TinyGo example build
        run: task tinygo:build
